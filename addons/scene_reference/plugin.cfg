[plugin]

name="Scene Reference"
description="A custom property to help keep track of where scenes are stored by adding UI sugar to uid's. This is mainly useful for situations where you need to avoid circular loading created due to how packed scenes are stored, or when you have to move around scenes.

To create a scene reference, define the export custom for aString or StringName like this:
@export_custom(0, \"scene\") scene_reference: String
You can then call load(scene_reference) later."
author="Pheubel"
version="1.0"
script="scene_reference.gd"
